version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stok_takip_db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: stok_user
      POSTGRES_PASSWORD: stok_pass_2024
      POSTGRES_DB: stok_takip
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
